<svg viewBox="0 0 1800 300" width="1800" height="300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Helvetica Neue', Arial, sans-serif">
  <title>Hau OTC Desk — wide banner</title>
  <rect width="1800" height="300" fill="#111113"/>

  <!-- eyebrow -->
  <circle cx="94" cy="92" r="4.5" fill="#D2683B"/>
  <text x="112" y="97" font-size="16" font-weight="600" letter-spacing="0.24em" fill="#9A9A93">UNICITY AGENTSPHERE</text>

  <!-- title -->
  <text x="90" y="176" font-size="62" font-weight="700" letter-spacing="0.02em" fill="#F7F6F2">HAU OTC DESK</text>
  <rect x="94" y="200" width="84" height="6" rx="3" fill="#D2683B"/>

  <!-- tagline -->
