<svg viewBox="0 0 2400 240" width="2400" height="240" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Helvetica Neue', Arial, sans-serif">
  <title>Hau OTC Desk — wide strip banner</title>
  <rect width="2400" height="240" fill="#111113"/>

  <!-- monogram card (left, vertically centered) -->
  <rect x="100" y="45" width="150" height="150" rx="34" fill="#17171A" stroke="#2A2A2E"/>
  <g transform="translate(126,71) scale(0.99)">
    <rect x="18" y="20" width="12" height="60" rx="3" fill="#F7F6F2"/>
    <rect x="70" y="20" width="12" height="60" rx="3" fill="#F7F6F2"/>
    <rect x="31" y="41" width="28" height="7" rx="2" fill="#D2683B"/>
    <polygon points="58,36 58,53 72,44.5" fill="#D2683B"/>
    <rect x="41" y="53" width="28" height="7" rx="2" fill="#D2683B"/>
    <polygon points="42,48 42,65 28,56.5" fill="#D2683B"/>
  </g>

  <!-- eyebrow -->
