  <rect x="294" y="150" width="72" height="5" rx="2.5" fill="#D2683B"/>

  <!-- tagline -->
  <text x="292" y="182" font-size="20" font-weight="500" fill="#D4D4CF">Autonomous OTC market-maker — private RFQ, atomic escrow settlement.</text>
