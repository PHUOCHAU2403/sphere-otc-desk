<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Helvetica Neue', Arial, sans-serif">
  <title>Hau OTC Desk — operations and risk stack</title>
  <desc>A branded ops dashboard card: stat tiles for inventory, settled deals, day P&amp;L and audit integrity, plus a row of armed risk-control badges.</desc>
  <rect width="1280" height="720" fill="#0E0E10"/>
  <circle cx="92" cy="86" r="4.5" fill="#D2683B"/>
  <text x="110" y="91" font-size="15" font-weight="600" letter-spacing="0.22em" fill="#8A8A85">STEP 5 · OPERATIONS · RISK STACK</text>

  <!-- panel -->
  <rect x="80" y="120" width="1120" height="446" rx="18" fill="#16161A" stroke="#2A2A2E"/>
  <text x="112" y="164" font-size="14" letter-spacing="0.14em" fill="#7A7A73" font-family="'SF Mono','JetBrains Mono',Consolas,monospace">OPS DASHBOARD · @hau-otc-desk · testnet2</text>
  <circle cx="1156" cy="158" r="5" fill="#5FBF8E"/>
  <text x="1146" y="163" text-anchor="end" font-size="13" letter-spacing="0.12em" fill="#5FBF8E" font-family="'SF Mono',Consolas,monospace">LIVE</text>

  <!-- stat tiles -->
  <g>
    <!-- tile 1 -->
    <rect x="112" y="196" width="244" height="150" rx="12" fill="#1C1C21" stroke="#2A2A2E"/>
    <rect x="112" y="196" width="244" height="4" rx="2" fill="#D2683B"/>
    <text x="136" y="238" font-size="13" letter-spacing="0.14em" fill="#8A8A85">INVENTORY</text>
    <text x="136" y="296" font-size="46" font-weight="700" fill="#F7F6F2">115<tspan font-size="22" fill="#8A8A85"> UCT</tspan></text>
    <!-- tile 2 -->
    <rect x="380" y="196" width="244" height="150" rx="12" fill="#1C1C21" stroke="#2A2A2E"/>
    <rect x="380" y="196" width="244" height="4" rx="2" fill="#D2683B"/>
    <text x="404" y="238" font-size="13" letter-spacing="0.14em" fill="#8A8A85">DEALS SETTLED</text>
    <text x="404" y="296" font-size="46" font-weight="700" fill="#F7F6F2">1<tspan font-size="22" fill="#8A8A85"> on-chain</tspan></text>
    <!-- tile 3 -->
    <rect x="648" y="196" width="244" height="150" rx="12" fill="#1C1C21" stroke="#2A2A2E"/>
    <rect x="648" y="196" width="244" height="4" rx="2" fill="#5FBF8E"/>
    <text x="672" y="238" font-size="13" letter-spacing="0.14em" fill="#8A8A85">DAY P&amp;L (MTM)</text>
    <text x="672" y="296" font-size="46" font-weight="700" fill="#5FBF8E">+0.00<tspan font-size="22" fill="#8A8A85"> USDU</tspan></text>
    <!-- tile 4 -->
    <rect x="916" y="196" width="272" height="150" rx="12" fill="#1C1C21" stroke="#2A2A2E"/>
    <rect x="916" y="196" width="272" height="4" rx="2" fill="#5FBF8E"/>
    <text x="940" y="238" font-size="13" letter-spacing="0.14em" fill="#8A8A85">AUDIT CHAIN</text>
    <text x="940" y="296" font-size="40" font-weight="700" fill="#5FBF8E">VERIFIED ✓</text>
  </g>

  <!-- risk badges -->
  <text x="112" y="400" font-size="13" letter-spacing="0.14em" fill="#7A7A73">RISK CONTROLS · ARMED</text>
  <g font-size="15" font-weight="600">
    <g><rect x="112" y="418" width="196" height="46" rx="23" fill="#17211B" stroke="#254634"/><circle cx="138" cy="441" r="5" fill="#5FBF8E"/><text x="156" y="446" fill="#CFE9DA">Kill-switch</text></g>
    <g><rect x="324" y="418" width="228" height="46" rx="23" fill="#17211B" stroke="#254634"/><circle cx="350" cy="441" r="5" fill="#5FBF8E"/><text x="368" y="446" fill="#CFE9DA">Circuit breaker</text></g>
    <g><rect x="568" y="418" width="204" height="46" rx="23" fill="#17211B" stroke="#254634"/><circle cx="594" cy="441" r="5" fill="#5FBF8E"/><text x="612" y="446" fill="#CFE9DA">P&amp;L breaker</text></g>
    <g><rect x="788" y="418" width="228" height="46" rx="23" fill="#17211B" stroke="#254634"/><circle cx="814" cy="441" r="5" fill="#5FBF8E"/><text x="832" y="446" fill="#CFE9DA">Pre-lock check</text></g>
    <g><rect x="1032" y="418" width="156" height="46" rx="23" fill="#17211B" stroke="#254634"/><circle cx="1058" cy="441" r="5" fill="#5FBF8E"/><text x="1076" y="446" fill="#CFE9DA">True-up</text></g>
  </g>

  <!-- two-venue price feed line -->
  <text x="112" y="522" font-size="15" fill="#8A8A85" font-family="'SF Mono',Consolas,monospace" xml:space="preserve">price feed · <tspan fill="#B7B7B1">median(2 venues)</tspan> · UCT_USDU mid <tspan fill="#E0A56A">1.25</tspan>   ·   deterministic quoting, LLM-free</text>

  <g transform="translate(80,612)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="#16161A" stroke="#2A2A2E"/>
    <g transform="translate(9,9) scale(0.42)">
      <rect x="18" y="20" width="12" height="60" rx="3" fill="#F7F6F2"/><rect x="70" y="20" width="12" height="60" rx="3" fill="#F7F6F2"/>
      <rect x="31" y="41" width="28" height="7" rx="2" fill="#D2683B"/><polygon points="58,36 58,53 72,44.5" fill="#D2683B"/>
      <rect x="41" y="53" width="28" height="7" rx="2" fill="#D2683B"/><polygon points="42,48 42,65 28,56.5" fill="#D2683B"/>
    </g>
    <text x="76" y="26" font-size="19" font-weight="700" letter-spacing="0.1em" fill="#F7F6F2">HAU OTC DESK</text>
    <text x="76" y="50" font-size="14.5" fill="#8A8A85">Full risk stack · tamper-evident hash-chained audit · Grafana-style ops.</text>
  </g>
</svg>
