<svg viewBox="0 0 100 100" width="100" height="100" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Hau OTC Desk — mark</title>
  <desc>Two opposing swap arrows: a two-way market that settles both legs at once.</desc>
  <!-- top arrow, points right (clay) -->
  <rect x="22" y="33" width="44" height="9" rx="2.5" fill="#D2683B"/>
  <polygon points="62,25 62,50 86,37.5" fill="#D2683B"/>
  <!-- bottom arrow, points left (ink) -->
  <rect x="34" y="58" width="44" height="9" rx="2.5" fill="#111113"/>
  <polygon points="38,50 38,75 14,62.5" fill="#111113"/>
</svg>
